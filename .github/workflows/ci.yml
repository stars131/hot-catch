name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: startrace_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test -d startrace_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test@127.0.0.1:5432/startrace_test?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      AUTH_SECRET: ci-only-secret
      DEV_AUTH_BYPASS: 0
      CREDENTIAL_ENCRYPTION_KEY: BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push
      - run: npm run db:backfill
      - run: npm run lint -- --max-warnings=0
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run test:contract
      - run: npm run test:integration
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          DEV_AUTH_BYPASS: "1"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
