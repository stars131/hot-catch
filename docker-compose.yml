services:
  db:
    image: postgres:16-alpine
    container_name: xhs-benchmark-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xhs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xhs_password}
      POSTGRES_DB: ${POSTGRES_DB:-xhs_benchmark}
      LANG: C.UTF-8
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - xhs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xhs} -d ${POSTGRES_DB:-xhs_benchmark}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  xhs_pgdata:
    name: xhs_benchmark_pgdata
